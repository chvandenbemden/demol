<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>De Mol – Mollenjacht Scorebord</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>De Mol – Mollenjacht</h1>
    <nav>
      <button data-view="voorspellingen">Voorspellingen</button>
      <button data-view="scores">Scores</button>
      <button data-view="grafiek">Grafiek</button>
      <button data-view="kandidaten">Kandidaten</button>
      <button data-view="instellingen">Instellingen</button>
    </nav>
  </header>

  <main>

    <!-- Instellingen -->
    <section id="instellingen" class="view hidden">
      <h2>Instellingen</h2>

      <div class="settings-block">
        <h3>Kandidaten</h3>
        <ul id="settings-candidates"></ul>
        <button id="add-candidate">Kandidaat toevoegen</button>
      </div>

      <div class="settings-block">
        <h3>Spelers</h3>
        <ul id="settings-players"></ul>
        <button id="add-player">Speler toevoegen</button>
      </div>

      <div class="settings-block">
        <h3>Weken</h3>
        <input type="number" id="settings-weeks" min="1" max="20" value="7">
      </div>

      <button id="save-settings" class="save-btn">Instellingen opslaan</button>
    </section>

    <!-- Kandidaten -->
    <section id="kandidaten" class="view hidden">
      <h2>Kandidaten</h2>
      <ul id="candidate-list"></ul>
    </section>

    <!-- Voorspellingen -->
    <section id="voorspellingen" class="view">
      <h2>Voorspellingen per week</h2>
      <div id="predictions-container"></div>
      <button id="recalculate">Herbereken scores</button>
    </section>

    <!-- Scores -->
    <section id="scores" class="view hidden">
      <h2>Scores & Ranking</h2>
      <table>
        <thead>
          <tr>
            <th>Speler</th>
            <th>Totaal</th>
            <th>Ranking</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="scores-body"></tbody>
      </table>
    </section>

    <!-- Grafiek -->
    <section id="grafiek" class="view hidden">
      <h2>Evolutie van de Mollenjagers</h2>
      <canvas id="chart" width="900" height="400"></canvas>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
